steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/gcp-bigdata-visualisation:$COMMIT_SHA', '.']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - jobs
      - deploy
      - api-to-bq-pipeline
      - --image=gcr.io/$PROJECT_ID/gcp-bigdata-visualisation:$COMMIT_SHA
      - --region=us-central1
      - --set-env-vars=ENV=prod
images:
  - 'gcr.io/$PROJECT_ID/gcp-bigdata-visualisation:$COMMIT_SHA'

# TODO(deploy): move env vars and secrets to Secret Manager + Cloud Run Job runtime env.
